spring.application.name=cowork-studio

# Flyway owns the schema; Hibernate must never auto-generate/alter DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.locations=classpath:db/migration

# HS256 needs >= 256 bits (32 chars). This default is for local dev only —
# always override with JWT_SECRET in any real environment.
app.security.jwt.secret=${JWT_SECRET:local-dev-only-secret-change-me-please-32B}
app.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

